<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TENET · Visualizations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; padding: 0; background: #1a2129; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  .scene-tabs { position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: stretch; height: 40px;
    background: rgba(26, 33, 41, 0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08); }
  .scene-tab { font-family: inherit; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 0 22px; border: none; background: transparent;
    color: rgba(255,255,255,0.4); cursor: pointer;
    transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    text-decoration: none; display: flex; align-items: center; }
  .scene-tab:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.04); }
  .scene-tab.active { color: #fff; background: rgba(255,255,255,0.08);
    box-shadow: inset 0 -2px 0 #e5484d; }
  .scene-tab[data-target="oslo.html"].active { box-shadow: inset 0 -2px 0 #2f6fed; }
  .scene-tab .tab-dot { width: 6px; height: 6px; border-radius: 50%;
    margin-right: 8px; flex-shrink: 0; }
  .dot-red { background: #e5484d; }
  .dot-blue { background: #2f6fed; }
  iframe { position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px); border: none; }
</style>
</head>
<body>
  <nav class="scene-tabs">
    <button class="scene-tab active" data-target="stalsk.html"><span class="tab-dot dot-red"></span>Stalsk-12 · Temporal Pincer</button>
    <button class="scene-tab" data-target="oslo.html"><span class="tab-dot dot-blue"></span>Oslo Freeport · Turnstile</button>
  </nav>
  
  <iframe id="viewer" src="stalsk.html"></iframe>

  <script>
    const tabs = document.querySelectorAll('.scene-tab');
    const viewer = document.getElementById('viewer');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // Update active tab
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Load iframe content
        viewer.src = tab.dataset.target;
      });
    });
  </script>
</body>
</html>
